<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - Pawland</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/auth.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-wrapper">
                <div class="logo">🐾 Pawland</div>
                <ul class="nav-links">
                    <li><a href="index.html">🏠 หน้าแรก</a></li>
                    <li><a href="products.html">🛍️ สินค้า</a></li>
                    <li><a href="about.html">ℹ️ เกี่ยวกับเรา</a></li>
                    <li><a href="contact.html">📧 ติดต่อ</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>🐾 เข้าสู่ระบบ</h1>
                <p>ยินดีต้อนรับกลับสู่ Pawland</p>
            </div>

            <form id="loginForm" class="auth-form" method="./php/login.php">
                <div class="form-group">
                    <label for="username">ชื่อผู้ใช้หรืออีเมล</label>
                    <input type="text" id="username" name="username" required autocomplete="username">
                    <span class="error-message" id="usernameError"></span>
                </div>

                <div class="form-group">
                    <label for="password">รหัสผ่าน</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('password')">👁️</button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span>จดจำการเข้าสู่ระบบ</span>
                    </label>
                </div>

                <button type="submit" class="btn-auth btn-primary">เข้าสู่ระบบ</button>

                <div class="auth-links">
                    <p>ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></p>
                </div>
            </form>

            <div id="message" class="message"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 pawland. All rights reserved.</p>
        <p>ร้านขายสุนัข แมว อาหาร และของเล่นคุณภาพ ส่งตรงถึงบ้าน</p>
    </footer>

    <script src="../js/auth.js"></script>
    <script src="../js/script.js"></script>
</body>
</html>
